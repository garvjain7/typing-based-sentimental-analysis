<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypingMood | AI Sentiment Analyzer</title>

    <!-- #9 Emoji favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌨</text></svg>" 
        />

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="An advanced Machine Learning platform that predicts your mood (Happy, Neutral, Stressed) based entirely on how you type. Experience live behavioral analytics and AI interpretability." />
    <meta name="keywords"
        content="Typing Analysis, Sentiment Analysis, Machine Learning, Behavioral Biometrics, Random Forest, Mood Predictor, AI Interpretability" />
    <meta name="author" content="Data Insights Sandbox" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook/LinkedIn) -->
    <meta property="og:title" content="TypingMood - Behavioral AI Sentiment Analyzer" />
    <meta property="og:description"
        content="Discover your mood by analyzing keystroke dynamics. Our Random Forest ML model predicts whether you are Happy, Stressed, or Neutral by how you type." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TypingMood" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TypingMood - AI Sentiment Analyzer" />
    <meta name="twitter:description"
        content="Predicting human mood through keystroke dynamics and ML behavioral analytics." />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LXHE7YRG4H"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-LXHE7YRG4H');
    </script>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body>
 
<div class="container">
 
  <header>
    <h1>⌨ TypingMood</h1>
    <p>Your keystrokes say more than your words.</p>
  </header>
 
  <!-- Top bar — always full width -->
  <div class="top-bar">
    <div class="stat-pill idle" id="pill-timer">
      <span>Time</span><span id="timer">—</span>
    </div>
    <div class="stat-pill idle" id="pill-wpm">
      <span>WPM</span><span id="live-wpm">—</span>
    </div>
    <div class="stat-pill idle" id="pill-acc">
      <span>Accuracy</span><span id="live-acc">—</span>
    </div>
  </div>
 
  <!-- ── SECTION 1: Paragraph + Mood prediction ───────────────────
       Before finish : paragraph is full width, #mood-panel hidden
       After finish  : paragraph shifts to 60%, mood panel slides in at 40%
       Controlled by adding class "finished" to #top-section
  ──────────────────────────────────────────────────────────────── -->
  <div id="top-section">
 
    <!-- Paragraph card — always visible -->
    <div class="card" id="paragraph-card">
      <div class="card-title">Paragraph</div>
      <div id="paragraph">{{ paragraph }}</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>
 
    <!-- Typing input card — always visible -->
    <div class="card" id="typing-card">
      <div class="card-title">Your Input</div>
      <textarea
        id="typing-input"
        placeholder="Click 'Start Typing' then begin…"
        disabled
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      ></textarea>
      <div class="btn-row">
        <button id="start-btn">Start Typing</button>
        <button id="finish-btn" disabled>Finish</button>
        <button id="reset-btn">Reset</button>
      </div>
      <div id="error-msg"></div>
    </div>
 
    <!-- Mood prediction panel — hidden until finish, slides in -->
    <div class="card" id="result-section">
      <div class="card-title">Mood Prediction</div>
 
      <!-- Analyzing spinner -->
      <div class="analyzing-state" id="analyzing-state" style="display:none;">
        <div class="spinner"></div>
        <span>Analyzing your typing patterns…</span>
      </div>
 
      <!-- Actual result -->
      <div class="result-body" id="result-body" style="display:none;">
        <div class="result-main">
          <div id="mood-label">—</div>
          <div class="confidence-bar-wrap">
            <div class="confidence-bar-fill" id="conf-bar"></div>
          </div>
          <div id="confidence"></div>
        </div>
        <div class="suggestions-title" style="margin-top:15px;">🧠 AI Reasoning</div>
        <div id="driving-factors" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;"></div>
        
        <div class="radar-wrap">
          <canvas id="radar-chart"></canvas>
        </div>

        <div class="suggestions-title">Suggestions</div>
        <ul id="suggestions"></ul>
      </div>
    </div>
 
  </div><!-- /#top-section -->
 
  <!-- ── SECTION 2: Chart (60%) + Session Details (40%) ───────────
       Always two columns, always visible
  ──────────────────────────────────────────────────────────────── -->
  <div id="bottom-section">
 
    <!-- Live chart — 60% -->
    <div class="card" id="chart-card">
      <div class="card-title">Live Performance</div>
      <div class="chart-wrap">
        <canvas id="typing-chart"></canvas>
      </div>
    </div>
 
    <!-- Session details — 40%, skeleton always shown -->
    <div class="card" id="stats-card">
      <div class="card-title">Session Details</div>
      <!-- Skeleton — visible until data arrives -->
      <div id="stats-skeleton">
        <div class="skeleton-grid">
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
          <div class="skeleton-card"><div class="skel skel-label"></div><div class="skel skel-value"></div></div>
        </div>
      </div>
      <!-- Real stats — hidden until data arrives -->
      <div id="stats-grid" style="display:none;"></div>
    </div>
  </div><!-- /#bottom-section -->
</div><!-- /.container -->
 
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script type="module">
  import { init } from "/static/js/typing.js";
  const paragraph = document.getElementById("paragraph").textContent.trim();
  init(paragraph);
</script>
 
</body>
</html>
